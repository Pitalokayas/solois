<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta Sekolah - SiOSS</title>

  <link href="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css)" rel="stylesheet" />
  <link href="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css)" rel="stylesheet" />
  <link rel="stylesheet" href="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.css)" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-shield-check me-2"></i>SiOSS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
          <li class="nav-item"><a class="nav-link" href="inventarisasi.html">Inventarisasi</a></li>
          <li class="nav-item"><a class="nav-link" href="statistik.html">Statistik</a></li>
          <li class="nav-item"><a class="nav-link active" href="peta.html">Peta</a></li>
          <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="page-header">
    <div class="container">
      <h1 class="fw-bold">Peta Lokasi Sekolah</h1>
      <p class="mb-0">Visualisasi titik koordinat sekolah berbasis Leaflet.</p>
    </div>
  </section>

  <section class="py-4">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="card shadow-sm border-0">
            <div class="card-body">
              <h5 class="fw-bold mb-3">Filter Peta</h5>
              <label for="filterJenjang" class="form-label">Jenjang</label>
              <select id="filterJenjang" class="form-select mb-3">
                <option value="">Semua Jenjang</option>
              </select>

              <label for="filterKapanewon" class="form-label">Kapanewon</label>
              <select id="filterKapanewon" class="form-select mb-3">
                <option value="">Semua Kapanewon</option>
              </select>

              <label for="filterZoSS" class="form-label">Status ZoSS</label>
              <select id="filterZoSS" class="form-select">
                <option value="">Semua Status</option>
                <option value="Ya">Ya</option>
                <option value="Tidak">Tidak</option>
              </select>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="card shadow-sm border-0">
            <div class="card-body p-0">
              <div id="map"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="mapLoading" class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 mb-0">Memuat peta dan data lokasi...</p>
      </div>
    </div>
  </section>

  <footer class="bg-dark text-white py-4">
    <div class="container text-center">
      <small>&copy; 2026 SiOSS</small>
    </div>
  </footer>

  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js)"></script>
  <script src="[unpkg.com](https://unpkg.com/leaflet@1.9.4/dist/leaflet.js)"></script>
  <script src="js/spreadsheet.js"></script>
  <script src="js/map.js"></script>
</body>
</html>
