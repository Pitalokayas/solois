<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<nav class="navbar navbar-dark bg-primary px-3">
<a class="navbar-brand">SiOSS Sleman</a>
<div>
<a href="inventarisasi.html" class="text-white me-3">Inventarisasi</a>
<a href="statistik.html" class="text-white me-3">Statistik</a>
<a href="peta.html" class="text-white me-3">Peta</a>

</div>

<div class="hero text-center text-white">
<h1>SiOSS Sleman</h1>
<p>Sistem Inventarisasi Zona Selamat Sekolah</p>
</div>

<div class="container mt-4">
<div class="row" id="cards"></div>
</div>

<script src="js/spreadsheet.js"></script>

<script>
loadData().then(data => {

document.getElementById("cards").innerHTML = `
<div class="col-md-3"><div class="card p-3">Total: ${data.length}</div></div>
<div class="col-md-3"><div class="card p-3">ZoSS: ${data.filter(d=>d["Apakah lokasi sudah memiliki ZoSS?"]=="Ya").length}</div></div>
<div class="col-md-3"><div class="card p-3">Belum ZoSS: ${data.filter(d=>d["Apakah lokasi sudah memiliki ZoSS?"]!="Ya").length}</div></div>
<div class="col-md-3"><div class="card p-3">Data Aktif</div></div>
`;

});
</script>

</body>
</html>
